# Deploy NexusTS landing page to GitHub Pages
name: Deploy Webpage

on:
  push:
    branches: [main]
    paths:
      - "webpage/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: webpage

      - name: Build VitePress site
        run: bun run build
        working-directory: webpage
        env:
          BASE_URL: /nexusts/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: webpage/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
