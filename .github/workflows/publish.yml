name: Publish packages to npm

# Publishes all 31 packages to npm. Triggers:
#   - on release (auto-publish on GitHub release)
#   - on workflow_dispatch (manual trigger)
#
# Modes for workflow_dispatch:
#   - publish       : real publish, 2s between packages, 4s batch break
#   - publish-batch : slower publish, 10s between packages, 15s batch break
#   - dry-run       : validate package.json only
#   - build         : build only, no registry interaction

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      mode:
        description: "publish | publish-batch | dry-run | build"
        required: false
        default: "dry-run"

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --no-frozen-lockfile

      - name: Build all packages
        run: bun run build:all || bun run build

      # Regular publish — release OR manual dispatch with mode=publish.
      # Default delays: 2s between packages, 4s batch break every 5.
      - name: Publish to npm (regular)
        if: >
          github.event_name == 'release'
          || (github.event_name == 'workflow_dispatch'
              && inputs.mode == 'publish')
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun run scripts/publish.ts

      # Batched publish — slower delays for first-time full publish.
      - name: Publish to npm (batched)
        if: >
          github.event_name == 'workflow_dispatch'
          && inputs.mode == 'publish-batch'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          PUBLISH_BATCH_DELAY_MS: "10000"
          PUBLISH_BATCH_BREAK_MS: "15000"
          PUBLISH_BATCH_BREAK_N: "5"
        run: bun run scripts/publish.ts

      # Validation path: only on manual dispatch with dry-run mode.
      - name: Dry run (validate package.json)
        if: >
          github.event_name == 'workflow_dispatch'
          && inputs.mode == 'dry-run'
        run: |
          echo "Dry run — checking package.json validity"
          for pkg in packages/*/; do
            if [ -f "$pkg/package.json" ]; then
              echo "✓ $pkg/package.json"
              node -e "JSON.parse(require('fs').readFileSync('$pkg/package.json', 'utf8'))" \
                || exit 1
            fi
          done

      # Build-only path: verify build without touching the registry.
      - name: Build only
        if: >
          github.event_name == 'workflow_dispatch'
          && inputs.mode == 'build'
        run: |
          echo "Build only — no publish, no validation"
          bun run build:all
