name: CI

# Runs the full test suite on every push/PR to main.
# Test matrix: Bun (primary) and Node.js 22 (parity).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Bun — primary runtime, full test suite
  # ──────────────────────────────────────────────────────────────────────────
  test-bun:
    name: "Test · Bun ${{ matrix.bun-version }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        bun-version:
          - "1.3.0" # pinned minimum
          - "latest" # rolling latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun ${{ matrix.bun-version }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Install dependencies
        run: |
          bun install --no-frozen-lockfile
          # Optional peer deps needed for type-check (installed in CI only)
          bun add -d \
            better-auth @faker-js/faker \
            @opentelemetry/api @opentelemetry/semantic-conventions \
            @grpc/grpc-js @grpc/proto-loader \
            pino pino-pretty \
            2>/dev/null || true

      - name: Run tests
        run: bun run test

      - name: Type-check
        run: bun run typecheck

  # ──────────────────────────────────────────────────────────────────────────
  # Node.js 22 — parity check (excludes Bun-native modules)
  # ──────────────────────────────────────────────────────────────────────────
  test-node:
    name: "Test · Node.js ${{ matrix.node-version }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - "22"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Bun is still used for package installation (bun.lockb)
      - name: Setup Bun (install only)
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: bun install --no-frozen-lockfile

      - name: Run tests (Node.js-safe subset)
        # Uses vitest.config.node.ts which excludes bun:sqlite-dependent tests.
        run: node --experimental-vm-modules node_modules/.bin/vitest run --config vitest.config.node.ts
        env:
          NODE_NO_WARNINGS: "1"

  # ──────────────────────────────────────────────────────────────────────────
  # Lint
  # ──────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --no-frozen-lockfile
      - run: bun run lint

  # ──────────────────────────────────────────────────────────────────────────
  # Build — verify all packages compile
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --no-frozen-lockfile
      - run: bun run build:all
