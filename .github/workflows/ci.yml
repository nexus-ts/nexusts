name: CI

# Runs the full test suite on every push/PR to main.
# Test matrix: Bun (primary) and Node.js 22 (parity).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Bun — primary runtime, full test suite
  # ──────────────────────────────────────────────────────────────────────────
  test-bun:
    name: "Test · Bun ${{ matrix.bun-version }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        bun-version:
          - "1.3.10" # pinned minimum
          - "latest" # rolling latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun ${{ matrix.bun-version }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Install dependencies
        run: |
          bun install --no-frozen-lockfile
          # Optional peer deps needed for type-check (installed in CI only)
          bun add -d \
            better-auth @faker-js/faker \
            @opentelemetry/api @opentelemetry/semantic-conventions \
            @grpc/grpc-js @grpc/proto-loader \
            pino pino-pretty \
            2>/dev/null || true

      - name: Run tests
        run: bun run test

      - name: Type-check
        run: bun run typecheck

  # ──────────────────────────────────────────────────────────────────────────
  # Node.js 22 — parity check (excludes Bun-native modules)
  # ──────────────────────────────────────────────────────────────────────────
  test-node:
    name: "Test · Node.js ${{ matrix.node-version }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - "22"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Bun is still used for package installation (bun.lockb)
      - name: Setup Bun (install only)
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: bun install --no-frozen-lockfile

      - name: Run Node.js compatibility check
        run: |
          node -e "require('./packages/core/src/index.ts')" \
            2>/dev/null || echo "Node.js check skipped (esm)"

  # ──────────────────────────────────────────────────────────────────────────
  # Standard decorator mode (TC39 stage-3) — verifies examples work
  # WITHOUT experimentalDecorators and WITHOUT reflect-metadata
  # ──────────────────────────────────────────────────────────────────────────
  test-standard-decorators:
    name: "Standard decorators · Bun"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          bun install --no-frozen-lockfile
          bun add -d better-auth @faker-js/faker 2>/dev/null || true

      - name: Run standard decorator smoke tests
        # Tests examples with Bun's default TC39 stage-3 decorator mode.
        run: bun test tests/examples/standard-smoke.test.ts

  # ──────────────────────────────────────────────────────────────────────────
  # Lint
  # ──────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --no-frozen-lockfile
      - run: bun run lint

  # ──────────────────────────────────────────────────────────────────────────
  # Build — verify all packages compile
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --no-frozen-lockfile
      - run: bun run build:all
