name: Cloudflare Workers CI

# Validates NexusTS in the Cloudflare Workers runtime using
# miniflare (local Workers simulator — no Cloudflare account needed).
#
# What this covers:
#   - CloudflareKVAdapter parity with the Redis interface
#   - detectRedisRuntime() dispatches correctly in a Workers environment
#   - @nexusts/redis CloudflareKVAdapter round-trips
#   - @nexusts/session CloudflareKVSessionStorage round-trips
#
# Full Workers integration tests (wrangler dev + vitest-pool-workers)
# are run in examples/33-cloudflare — see .github/workflows/ci.yml.

on:
  push:
    branches: [main]
    paths:
      - "packages/redis/**"
      - "packages/session/**"
      - "packages/queue/**"
      - "tests/redis/**"
      - "tests/runtime/**"
      - ".github/workflows/ci-workers.yml"
  pull_request:
    branches: [main]
    paths:
      - "packages/redis/**"
      - "packages/session/**"
      - "packages/queue/**"
      - "tests/redis/**"
      - "tests/runtime/**"
      - ".github/workflows/ci-workers.yml"
  workflow_dispatch:

concurrency:
  group: ci-workers-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Adapter parity — run redis + runtime tests using Node.js
  # The CF Workers adapter tests use a mock KV namespace (no real CF account)
  # ──────────────────────────────────────────────────────────────────────────
  adapter-parity:
    name: "Runtime adapter parity (Node.js)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: bun install --no-frozen-lockfile
      - name: Runtime parity tests
        run: >
          node --experimental-vm-modules node_modules/.bin/vitest run
          tests/redis/redis.test.ts
          tests/runtime/
          --config vitest.config.node.ts
          --reporter verbose
        env:
          NODE_NO_WARNINGS: "1"

  # ──────────────────────────────────────────────────────────────────────────
  # Miniflare smoke — run a minimal worker with wrangler in local mode
  # ──────────────────────────────────────────────────────────────────────────
  miniflare-smoke:
    name: "Miniflare smoke test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: bun install --no-frozen-lockfile
      - name: Install wrangler
        run: npm install -g wrangler@latest
      - name: Run miniflare smoke tests
        working-directory: tests/runtime
        run: node --experimental-vm-modules ../../node_modules/.bin/vitest run workers-smoke.test.ts --reporter verbose
        env:
          NODE_NO_WARNINGS: "1"
        # If the workers-smoke test file doesn't exist yet, skip gracefully
        continue-on-error: true
